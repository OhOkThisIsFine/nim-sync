name: Publish Package

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: publish

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Verify release tag is on master branch
        if: github.event_name == 'push'
        run: |
          echo "Starting phase: Verify release tag is on master branch..."
          start_time=$(date +%s)
          git branch -r --contains ${{ github.ref_name }} | grep -q "origin/master" || {
            echo "Error: Tag ${{ github.ref_name }} is not on the master branch."
            exit 1
          }
          end_time=$(date +%s)
          elapsed=$((end_time - start_time))
          echo "Completed phase: Verify release tag is on master branch in ${elapsed}s."

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.0.0'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify release tag matches package version
        if: github.event_name == 'push'
        run: |
          echo "Starting phase: Verify release tag matches package version..."
          start_time=$(date +%s)
          node scripts/verify-release-tag.mjs
          end_time=$(date +%s)
          elapsed=$((end_time - start_time))
          echo "Completed phase: Verify release tag matches package version in ${elapsed}s."

      - name: Install dependencies
        timeout-minutes: 5
        run: |
          echo "Starting phase: Install dependencies..."
          start_time=$(date +%s)
          npm ci
          end_time=$(date +%s)
          elapsed=$((end_time - start_time))
          echo "Completed phase: Install dependencies in ${elapsed}s."

      - name: Run tests
        timeout-minutes: 10
        run: |
          echo "Starting phase: Run tests..."
          start_time=$(date +%s)
          npm test -- --run
          end_time=$(date +%s)
          elapsed=$((end_time - start_time))
          echo "Completed phase: Run tests in ${elapsed}s."

      - name: Run lint
        timeout-minutes: 5
        run: |
          echo "Starting phase: Run lint..."
          start_time=$(date +%s)
          npm run lint
          end_time=$(date +%s)
          elapsed=$((end_time - start_time))
          echo "Completed phase: Run lint in ${elapsed}s."

      - name: Run typecheck
        timeout-minutes: 5
        run: |
          echo "Starting phase: Run typecheck..."
          start_time=$(date +%s)
          npm run typecheck
          end_time=$(date +%s)
          elapsed=$((end_time - start_time))
          echo "Completed phase: Run typecheck in ${elapsed}s."

      - name: Build package
        timeout-minutes: 5
        run: |
          echo "Starting phase: Build package..."
          start_time=$(date +%s)
          npm run build
          end_time=$(date +%s)
          elapsed=$((end_time - start_time))
          echo "Completed phase: Build package in ${elapsed}s."

      - name: Publish to npm
        id: publish
        if: github.event_name == 'push'
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08 # v3.0.2
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        with:
          max_attempts: 3
          retry_on: error
          timeout_minutes: 5
          command: |
            echo "Starting phase: Publish to npm..."
            start_time=$(date +%s)
            exit_code=0
            npm publish --provenance --access public 2> npm-publish-error.log || exit_code=$?
            end_time=$(date +%s)
            elapsed=$((end_time - start_time))
            echo "Completed phase: Publish to npm in ${elapsed}s."
            if [ $exit_code -ne 0 ]; then
              echo $exit_code > npm-publish-status.txt
              cat npm-publish-error.log >&2
              exit $exit_code
            fi

      - name: Notify publish failure
        if: failure() && steps.publish.outcome == 'failure'
        run: |
          echo "::warning::npm publish failed after 3 attempts."
          if [ -f npm-publish-status.txt ]; then
            echo "Exit code: $(cat npm-publish-status.txt)"
          fi
          if [ -f npm-publish-error.log ]; then
            echo "=== npm registry response / error details ==="
            cat npm-publish-error.log
          fi
